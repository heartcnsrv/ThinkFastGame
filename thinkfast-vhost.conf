# 
#  ThinkFast  |  thinkfast-vhost.conf
#
#  Architecture:
#    Browser → Apache/WAMP → PHP proxy (backend/proxy.php)
#            → C++ server (ThinkFastServer.exe) on localhost:8080
#
#  MUST have ThinkFastServer.exe running BEFORE opening the game.
#
#  Also requires in httpd.conf:
#    LoadModule rewrite_module modules/mod_rewrite.so
#    Include conf/extra/httpd-vhosts.conf
#

# ThinkFast
<VirtualHost *:80>
  ServerName thinkfast
  ServerAlias www.thinkfast
  DocumentRoot "C:/wamp64/www/ThinkFast3"

  <Directory "C:/wamp64/www/ThinkFast3/">
    Options +Indexes +Includes +FollowSymLinks +MultiViews
    AllowOverride All
    Require all granted
  </Directory>

  RewriteEngine On
  RewriteRule ^/api/(.+)$ /backend/proxy.php [QSA,L]

  ErrorLog "c:/wamp64/logs/thinkfast-error.log"
  CustomLog "c:/wamp64/logs/thinkfast-access.log" combined
</VirtualHost>
